# Render.com Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: temiryol-backend
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_NAME
        value: temiryol-backend
      - key: MONGODB_URI
        sync: false # Render UI da o'zingiz qo'shing
      - key: JWT_SECRET
        generateValue: true # Render avtomatik random qiymat beradi
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        sync: false # frontend URL ni qo'shing
      - key: MAX_LOGIN_ATTEMPTS
        value: 3
      - key: LOGIN_LOCK_MINUTES
        value: 15
      - key: ALLOW_DATE_OVERRIDE
        value: false
      - key: SEED_ADMIN_CODE
        value: "9999"
      - key: SEED_ADMIN_NAME
        value: Bosh Admin
      - key: SEED_DEVELOPER_CODE
        value: "9998"
      - key: SEED_DEVELOPER_NAME
        value: Tizim Boshqaruvchisi
